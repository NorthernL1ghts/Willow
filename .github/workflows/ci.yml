name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify repository layout
        run: |
          test -f README.md
          test -f LICENSE
          echo "Basic checks passed. Add compiler, tests, or linters here as the project grows."
